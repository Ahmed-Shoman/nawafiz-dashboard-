kind = "web"
previewPath = "/"
title = "نوافذ المستقبل - Real Estate Landing Page"
version = "1.0.0"
id = "artifacts/nawafiz-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20996

[services.development]
run = "pnpm --filter @workspace/nawafiz-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nawafiz-landing", "run", "build" ]
publicDir = "artifacts/nawafiz-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20996"
BASE_PATH = "/"
